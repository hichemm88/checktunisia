name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gates bloquants : lint (rules-of-hooks, etc.), types et tests doivent passer.
      - name: Lint
        run: npm run lint

      # La dette de types a ete resorbee : verbatimModuleSyntax + 0 erreur tsc.
      # Cette etape est desormais bloquante pour empecher toute regression.
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test
