name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gates bloquants : le lint (rules-of-hooks, etc.) et les tests doivent passer.
      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      # Rapport non bloquant pour l'instant : ~19 erreurs de types pre-existantes
      # restent a traiter (voir le lot "dette de types") avant de rendre cette
      # etape bloquante. Elle rend deja les erreurs visibles sur chaque PR.
      - name: Typecheck (rapport)
        run: npm run typecheck
        continue-on-error: true
